workflows:
  hyperliquid-drink-smarter-app-store:
    name: Hyperliquid Drink Smarter — App Store (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "1"

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hyperliquiddrinksmarter.app
      vars:
        XCODE_PROJECT: HyperliquidDrinkSmarter/HyperliquidDrinkSmarter.xcodeproj
        XCODE_SCHEME: HyperliquidDrinkSmarter
        BUNDLE_ID: com.hyperliquiddrinksmarter.app
        EXPORT_OPTIONS_PLIST: HyperliquidDrinkSmarter/ExportOptions.plist
        APP_STORE_APPLE_ID: 6779949766
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"

          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found in Codemagic."
            echo "Upload App Store profile for $BUNDLE_ID in Team settings > Code signing identities."
            exit 1
          fi

          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract TeamIdentifier.0 raw -)
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          echo "Team ID: $TEAM_ID"
          echo "Profile: $PROFILE_NAME"
          echo "DEVELOPMENT_TEAM=$TEAM_ID" >> "$CM_ENV"

          security find-identity -v -p codesigning || true

          EXPORT="$CM_BUILD_DIR/$EXPORT_OPTIONS_PLIST"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '  <key>method</key>'
            echo '  <string>app-store</string>'
            echo '  <key>teamID</key>'
            echo "  <string>${TEAM_ID}</string>"
            echo '  <key>signingStyle</key>'
            echo '  <string>manual</string>'
            echo '  <key>signingCertificate</key>'
            echo '  <string>Apple Distribution</string>'
            echo '  <key>provisioningProfiles</key>'
            echo '  <dict>'
            echo "    <key>${BUNDLE_ID}</key>"
            echo "    <string>${PROFILE_NAME}</string>"
            echo '  </dict>'
            echo '  <key>stripSwiftSymbols</key>'
            echo '  <true/>'
            echo '  <key>uploadSymbols</key>'
            echo '  <true/>'
            echo '</dict>'
            echo '</plist>'
          } > "$EXPORT"

      - name: Set build number from App Store Connect
        script: |
          set -e
          cd "$CM_BUILD_DIR/HyperliquidDrinkSmarter"
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>&1 || true)
          echo "App Store Connect latest build response: $LATEST"
          if [[ "$LATEST" =~ ^[0-9]+$ ]]; then
            NEXT=$(($LATEST + 1))
            echo "Using build number $NEXT (previous: $LATEST)"
          else
            NEXT=${BUILD_NUMBER:-1}
            echo "First upload — no builds in TestFlight yet. Using build number $NEXT"
          fi
          agvtool new-version -all "$NEXT"

      - name: Build IPA for App Store
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$CM_BUILD_DIR/$EXPORT_OPTIONS_PLIST"

      - name: Publish IPA to TestFlight
        script: |
          set -e
          IPA=$(find "$CM_BUILD_DIR/build/ios/ipa" -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: IPA not found under build/ios/ipa"
            exit 1
          fi
          echo "Uploading $IPA (bundle: $BUNDLE_ID, apple id: $APP_STORE_APPLE_ID)"
          # Xcode 26 new altool is broken; legacy altool resolves bundle ID correctly.
          if ! app-store-connect publish \
            --path "$IPA" \
            --testflight \
            --altool-additional-arguments '--use-old-altool --apple-id 6779949766'; then
            echo "Retrying upload with legacy altool only (no explicit apple-id)..."
            app-store-connect publish \
              --path "$IPA" \
              --testflight \
              --altool-additional-arguments '--use-old-altool'
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - support@hyperliquiddrinksmarter3121.info
        notify:
          success: true
          failure: true

  hyperliquid-drink-smarter-ios-build:
    name: Hyperliquid Drink Smarter — iOS build only
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: HyperliquidDrinkSmarter/HyperliquidDrinkSmarter.xcodeproj
        XCODE_SCHEME: HyperliquidDrinkSmarter
      xcode: latest

    scripts:
      - name: Build for iOS Simulator (sanity check)
        script: |
          xcodebuild -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - /tmp/xcodebuild_logs/*.log
