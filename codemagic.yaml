workflows:
  hyperliquid-drink-smarter-app-store:
    name: Hyperliquid Drink Smarter — App Store (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hyperliquiddrinksmarter.app
      vars:
        XCODE_PROJECT: HyperliquidDrinkSmarter/HyperliquidDrinkSmarter.xcodeproj
        XCODE_SCHEME: HyperliquidDrinkSmarter
        BUNDLE_ID: com.hyperliquiddrinksmarter.app
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project "$CM_BUILD_DIR/$XCODE_PROJECT"

          echo "Available code signing identities:"
          security find-identity -v -p codesigning || true

          PROFILE_PATH=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            echo "No provisioning profile found after use-profiles"
            exit 1
          fi

          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract TeamIdentifier.0 raw -)
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          echo "Using Team ID: $TEAM_ID"
          echo "Using profile: $PROFILE_NAME"
          echo "DEVELOPMENT_TEAM=$TEAM_ID" >> "$CM_ENV"

          /usr/libexec/PlistBuddy -c "Delete :teamID" "$CM_BUILD_DIR/HyperliquidDrinkSmarter/ExportOptions.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$CM_BUILD_DIR/HyperliquidDrinkSmarter/ExportOptions.plist"

          /usr/libexec/PlistBuddy -c "Delete :provisioningProfiles" "$CM_BUILD_DIR/HyperliquidDrinkSmarter/ExportOptions.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$CM_BUILD_DIR/HyperliquidDrinkSmarter/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Delete :signingCertificate" "$CM_BUILD_DIR/HyperliquidDrinkSmarter/ExportOptions.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string Apple Distribution" "$CM_BUILD_DIR/HyperliquidDrinkSmarter/ExportOptions.plist"

      - name: Set build number from Codemagic
        script: |
          cd "$CM_BUILD_DIR/HyperliquidDrinkSmarter"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build IPA for App Store
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$CM_BUILD_DIR/HyperliquidDrinkSmarter/ExportOptions.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - support@hyperliquiddrinksmarter3121.info
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  hyperliquid-drink-smarter-ios-build:
    name: Hyperliquid Drink Smarter — iOS build only
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: HyperliquidDrinkSmarter/HyperliquidDrinkSmarter.xcodeproj
        XCODE_SCHEME: HyperliquidDrinkSmarter
      xcode: latest

    scripts:
      - name: Build for iOS Simulator (sanity check)
        script: |
          xcodebuild -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - /tmp/xcodebuild_logs/*.log
